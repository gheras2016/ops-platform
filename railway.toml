[build]
builder = "NIXPACKS"

[deploy]
# On each deploy: migrate (idempotent), (re)create the public storage symlink so
# uploaded images are served at /storage/... , start the scheduler in the
# background (subscriptions:tick daily), then serve in the foreground.
startCommand = "php artisan migrate --force && php artisan storage:link --force && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=$PORT"